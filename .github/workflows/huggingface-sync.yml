name: Sync to Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Server qovluğunu ayrıca bir yerə kopyalayıb təmiz şəkildə göndəririk
          mkdir temp_hf
          cp -r server/* temp_hf/
          cd temp_hf
          git init
          git add .
          git commit -m "Sync from GitHub"
          git push --force https://raemishex:$HF_TOKEN@huggingface.co/spaces/raemishex/SHADE-classroom-server main
