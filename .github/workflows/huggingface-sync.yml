name: Sync to Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push server folder to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Server qovluğunu ayrıca bir budaq (branch) kimi hazırlayırıq və HF-ə göndəririk
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git subtree push --prefix server https://raemishex:$HF_TOKEN@huggingface.co/spaces/raemishex/SHADE-classroom-server main
